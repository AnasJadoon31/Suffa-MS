server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Do not let Cloudflare/browsers cache the SPA shell or service worker.
  # Vite bakes API_BASE into hashed JS bundles; stale index/sw cache can keep
  # clients loading an old bundle that calls http://api-suffa and triggers
  # browser Mixed Content blocking.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /index.html =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /sw.js =404;
  }

  location = /registerSW.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files /registerSW.js =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache" always;
    try_files /manifest.webmanifest =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files $uri $uri/ /index.html;
  }
}
