services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://mms:${DB_PASSWORD}@bidci6fpu9mwov6ebann77tz:5432/suffa_ms
      REDIS_URL: redis://suffa-ms-redis:6379/0
      S3_ENDPOINT: ${MINIO_ENDPOINT}
      S3_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      S3_BUCKET: ${MINIO_BUCKET:-suffa-ms}
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      DEFAULT_TENANT: ${DEFAULT_TENANT:-suffa}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MADRASA_NAME: ${MADRASA_NAME:-Suffa Madrasa}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_BUCKET: ${MINIO_BUCKET:-suffa-ms}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      - redis
    networks:
      - default
      - coolify
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://mms:${DB_PASSWORD}@bidci6fpu9mwov6ebann77tz:5432/suffa_ms
      REDIS_URL: redis://suffa-ms-redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEFAULT_TENANT: ${DEFAULT_TENANT:-suffa}
    depends_on:
      - redis
    networks:
      - default
      - coolify
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${API_BASE}
    environment:
      VITE_API_BASE: ${API_BASE}
    ports:
      - "5173:80"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${API_BASE}
    environment:
      NEXT_PUBLIC_API_BASE: ${API_BASE}
    ports:
      - "3000:3000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      default:
        aliases:
          - suffa-ms-redis
    restart: unless-stopped

networks:
  coolify:
    external: true
